---
# PSW sweep: Single mill (Cr=0.5, lr=0.1)
# transform=log, clamp=C0, mass_postprocess=simplex
# Auto-generated by scripts/create_preprocess_sweep_configs.py

sim:
  N: 100
  T: 20.0
  dt: 0.04
  Lx: 15.0
  Ly: 15.0
  bc: periodic
test_sim:
  T: 100.0
model:
  type: discrete
  speed: 3.0
  speed_mode: constant_with_forces
params:
  R: 4.0
noise:
  kind: gaussian
  eta: 0.2
  match_variance: true
forces:
  enabled: true
  type: morse
  params:
    Ca: 1.0
    Cr: 0.5
    la: 1.0
    lr: 0.1
    mu_t: 0.3
    rcut_factor: 5.0
alignment:
  enabled: true
density:
  nx: 48
  ny: 48
  bandwidth: 3.0
outputs:
  density_resolution: 48
  density_bandwidth: 3.0
train_ic:
  type: mixed_comprehensive
  gaussian:
    enabled: true
    n_runs: 40
    positions_x:
    - 3.0
    - 7.5
    - 12.0
    positions_y:
    - 3.0
    - 7.5
    - 12.0
    variances:
    - 1.0
    - 2.0
    - 3.5
    n_samples_per_config: 1
  uniform:
    enabled: true
    n_runs: 20
    n_samples: 20
  two_clusters:
    enabled: true
    n_runs: 12
    separations:
    - 3.0
    - 5.0
    - 7.0
    sigmas:
    - 1.0
    - 2.0
    n_samples_per_config: 2
  ring:
    enabled: true
    n_runs: 12
    radii:
    - 2.0
    - 3.5
    - 5.0
    widths:
    - 0.5
    - 1.0
    n_samples_per_config: 2
test_ic:
  type: mixed_test_comprehensive
  gaussian:
    enabled: true
    n_runs: 1
    test_positions_x:
    - 7.5
    test_positions_y:
    - 7.5
    test_variances:
    - 1.5
    n_samples_per_config: 1
  uniform:
    enabled: true
    n_runs: 1
  two_clusters:
    enabled: true
    n_runs: 1
    test_separations:
    - 5.0
    test_sigmas:
    - 1.5
    n_samples_per_config: 1
  ring:
    enabled: true
    n_runs: 1
    test_radii:
    - 3.5
    test_widths:
    - 0.8
    n_samples_per_config: 1
rom:
  subsample: 3
  fixed_modes: 10
  density_transform: log
  density_transform_eps: 1.0e-10
  shift_align: true
  shift_align_ref: mean
  save_unaligned_pod: false
  mass_postprocess: simplex
  models:
    mvar:
      enabled: true
      lag: 5
      ridge_alpha: 0.0001
    lstm:
      enabled: true
      lag: 20
      hidden_units: 64
      num_layers: 2
      dropout: 0.1
      residual: true
      use_layer_norm: true
      normalize_input: true
      max_epochs: 150
      patience: 25
      learning_rate: 0.0007
      batch_size: 512
      gradient_clip: 5.0
      weight_decay: 1.0e-05
eval:
  metrics:
  - r2
  - rmse
  save_forecasts: false
  save_time_resolved: false
  forecast_start: 0.6
  clamp_mode: C0
experiment_name: PSW_SM01_log_C0_simplex

---
# LSTM-only size ablation derived from current systematic config
# Base config: configs/systematic/DO_ES01_escsym_C3_l09.yaml
# Regime: Escape symmetric (ES01)
# Variant: Current reference | hidden_units=64, num_layers=2
# Lighter proxy sweep: sim.N=200
# MVAR disabled; all other preprocessing/training settings inherit from the current systematic defaults.
# Auto-generated by scripts/create_lstm_size_ablation_configs.py

sim:
  N: 200
  T: 20.0
  dt: 0.04
  Lx: 25.0
  Ly: 25.0
  bc: periodic
test_sim:
  T: 200.0
model:
  type: discrete
  speed: 3.0
  speed_mode: constant_with_forces
params:
  R: 4.0
noise:
  kind: gaussian
  eta: 0.2
  match_variance: true
forces:
  enabled: true
  type: morse
  params:
    Ca: 1.0
    Cr: 3.0
    la: 1.0
    lr: 0.9
    mu_t: 0.3
    rcut_factor: 5.0
alignment:
  enabled: true
density:
  nx: 64
  ny: 64
  bandwidth: 5.0
outputs:
  density_resolution: 64
  density_bandwidth: 5.0
train_ic:
  type: mixed_comprehensive
  gaussian:
    enabled: true
    n_runs: 80
    positions_x:
    - 5.0
    - 10.0
    - 15.0
    - 20.0
    positions_y:
    - 5.0
    - 10.0
    - 15.0
    - 20.0
    variances:
    - 1.5
    - 3.0
    - 5.0
    n_samples_per_config: 2
  uniform:
    enabled: true
    n_runs: 80
    n_samples: 80
  two_clusters:
    enabled: true
    n_runs: 80
    separations:
    - 3.0
    - 5.0
    - 7.0
    - 10.0
    sigmas:
    - 1.0
    - 2.0
    - 3.0
    n_samples_per_config: 7
  ring:
    enabled: true
    n_runs: 80
    radii:
    - 2.0
    - 3.5
    - 5.0
    - 6.5
    - 8.0
    widths:
    - 0.4
    - 0.8
    - 1.2
    - 1.8
    n_samples_per_config: 4
test_ic:
  type: mixed_test_comprehensive
  gaussian:
    enabled: true
    n_runs: 1
    test_positions_x:
    - 12.5
    test_positions_y:
    - 12.5
    test_variances:
    - 2.5
    n_samples_per_config: 1
  uniform:
    enabled: true
    n_runs: 1
  two_clusters:
    enabled: true
    n_runs: 1
    test_separations:
    - 7.0
    test_sigmas:
    - 2.0
    n_samples_per_config: 1
  ring:
    enabled: true
    n_runs: 1
    test_radii:
    - 5.0
    test_widths:
    - 0.8
    n_samples_per_config: 1
rom:
  subsample: 3
  fixed_modes: 19
  density_transform: sqrt
  density_transform_eps: 1.0e-10
  shift_align: true
  shift_align_ref: mean
  save_unaligned_pod: true
  mass_postprocess: simplex
  models:
    mvar:
      enabled: false
      lag: 5
      ridge_alpha: 0.0001
    lstm:
      enabled: true
      lag: 5
      hidden_units: 64
      num_layers: 2
      dropout: 0.1
      residual: true
      use_layer_norm: true
      normalize_input: true
      max_epochs: 300
      patience: 40
      learning_rate: 0.0007
      batch_size: 512
      gradient_clip: 5.0
      weight_decay: 1.0e-05
eval:
  metrics:
  - r2
  - rmse
  save_forecasts: true
  save_time_resolved: true
  forecast_start: 0.6
  clamp_mode: C0
experiment_name: LSIZE_ES01_h64_L2

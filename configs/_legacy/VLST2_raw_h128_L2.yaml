---
# ============================================================================
# VLST2_raw_h128_L2 — Variable-speed LST7 with richer training
# ============================================================================
# Based on LST7 (best LSTM: R²=0.96 with constant speed).
# Changes: variable speed, longer T_train=30s, all 4 IC types,
#          more diverse training data.
# Architecture: raw/none, H=128, L=2 (same as LST7).
# ============================================================================

experiment_name: "VLST2_raw_h128_L2"

sim:
  N: 200
  T: 30.0
  dt: 0.04
  Lx: 25.0
  Ly: 25.0
  bc: "periodic"

test_sim:
  T: 36.6

model:
  type: "discrete"
  speed: 4.0
  speed_mode: "variable"

params:
  R: 4.0

noise:
  kind: "gaussian"
  eta: 0.2
  match_variance: true

forces:
  enabled: true
  type: "morse"
  params:
    Ca: 1.5
    Cr: 0.5
    la: 1.5
    lr: 0.5
    mu_t: 0.3
    rcut_factor: 5.0

alignment:
  enabled: true

density:
  nx: 64
  ny: 64
  bandwidth: 5.0

outputs:
  density_resolution: 64
  density_bandwidth: 5.0

# ── Training ICs: all 4 types, ~200 total ──
train_ic:
  type: "mixed_comprehensive"
  uniform:
    enabled: true
    n_runs: 60
    n_samples: 60
  gaussian:
    enabled: true
    n_runs: 100
    n_samples_per_config: 1
    positions_x: [5.0, 10.0, 12.5, 15.0, 20.0]
    positions_y: [5.0, 10.0, 12.5, 15.0, 20.0]
    variances: [1.0, 2.0, 3.0, 5.0, 7.0]
  two_clusters:
    enabled: true
    n_runs: 36
    n_samples_per_config: 4
    separations: [3.0, 5.0, 7.0, 10.0]
    sigmas: [1.0, 2.0, 3.0]
  ring:
    enabled: true
    n_runs: 30
    radii: [3.0, 5.0, 7.0, 9.0]
    widths: [0.5, 1.0, 2.0]
    n_samples_per_config: 3

# ── Test ICs: diverse mix ──
test_ic:
  type: "mixed_test_comprehensive"
  uniform:
    enabled: true
    n_runs: 10
  gaussian:
    enabled: true
    n_runs: 4
    n_samples_per_config: 1
  two_clusters:
    enabled: true
    n_runs: 3
    n_samples_per_config: 1
    separations: [6.0]
    sigmas: [2.0]
  ring:
    enabled: true
    n_runs: 3
    test_radii: [5.0]
    test_widths: [1.0]
    n_samples_per_config: 1

# ── ROM pipeline ──
rom:
  subsample: 3
  fixed_modes: 19
  density_transform: "raw"
  density_transform_eps: 1.0e-10
  shift_align: true
  shift_align_ref: "mean"
  mass_postprocess: "none"

  models:
    mvar:
      enabled: true
      lag: 5
      ridge_alpha: 1.0e-4
    lstm:
      enabled: true
      hidden_units: 128
      num_layers: 2
      max_epochs: 300
      learning_rate: 0.0007
      batch_size: 512
      lag: 5
      dropout: 0.15
      residual: true
      use_layer_norm: true
      normalize_input: true
      gradient_clip: 5.0
      patience: 40
      weight_decay: 1.0e-5
      multistep_loss: false
      scheduled_sampling: false

eval:
  forecast_start: 0.6
  clamp_mode: "C0"
  metrics: ["r2", "rmse"]
  save_forecasts: true
  save_time_resolved: true

alignment:
  enabled: true
cleanup_train_after_pod: true
density:
  bandwidth: 5.0
  nx: 64
  ny: 64
eval:
  clamp_mode: C0
  forecast_start: 0.6
  metrics:
  - r2
  - rmse
  save_forecasts: true
  save_time_resolved: true
experiment_name: NDYN07_crystal_eta1p00_ws
forces:
  enabled: true
  params:
    Ca: 3.0
    Cr: 3.0
    la: 2.0
    lr: 0.5
    mu_t: 0.3
    rcut_factor: 5.0
  type: morse
meta:
  is_native: false
  native_eta: 0.1
  sweep: noise
  tier: 2
model:
  speed: 2.0
  speed_mode: constant_with_forces
  type: discrete
noise:
  eta: 1.0
  kind: gaussian
  match_variance: true
outputs:
  density_bandwidth: 5.0
  density_resolution: 64
params:
  R: 4.0
rom:
  density_transform: sqrt
  density_transform_eps: 1.0e-10
  fixed_modes: 19
  mass_postprocess: none
  models:
    lstm:
      batch_size: 512
      dropout: 0.0
      enabled: false
      gradient_clip: 5.0
      hidden_units: 128
      lag: 5
      learning_rate: 0.0007
      max_epochs: 300
      normalize_input: true
      num_layers: 2
      patience: 40
      residual: false
      use_layer_norm: true
      weight_decay: 1.0e-05
    mvar:
      enabled: false
      lag: 5
      ridge_alpha: 0.0001
  save_unaligned_pod: true
  shift_align: true
  shift_align_ref: mean
  subsample: 3
sim:
  Lx: 25.0
  Ly: 25.0
  N: 300
  T: 20.0
  bc: periodic
  dt: 0.04
test_ic:
  gaussian:
    enabled: true
    n_runs: 1
    n_samples_per_config: 1
    test_positions_x:
    - 12.5
    test_positions_y:
    - 12.5
    test_variances:
    - 2.5
  ring:
    enabled: true
    n_runs: 1
    n_samples_per_config: 1
    test_radii:
    - 5.0
    test_widths:
    - 0.8
  two_clusters:
    enabled: true
    n_runs: 1
    n_samples_per_config: 1
    test_separations:
    - 7.0
    test_sigmas:
    - 2.0
  type: mixed_test_comprehensive
  uniform:
    enabled: true
    n_runs: 1
test_sim:
  T: 200.0
train_ic:
  gaussian:
    enabled: true
    n_runs: 80
    n_samples_per_config: 2
    positions_x:
    - 5.0
    - 10.0
    - 15.0
    - 20.0
    positions_y:
    - 5.0
    - 10.0
    - 15.0
    - 20.0
    variances:
    - 1.5
    - 3.0
    - 5.0
  ring:
    enabled: true
    n_runs: 80
    n_samples_per_config: 4
    radii:
    - 2.0
    - 3.5
    - 5.0
    - 6.5
    - 8.0
    widths:
    - 0.4
    - 0.8
    - 1.2
    - 1.8
  two_clusters:
    enabled: true
    n_runs: 80
    n_samples_per_config: 7
    separations:
    - 3.0
    - 5.0
    - 7.0
    - 10.0
    sigmas:
    - 1.0
    - 2.0
    - 3.0
  type: mixed_comprehensive
  uniform:
    enabled: true
    n_runs: 80
    n_samples: 80
wsindy:
  bootstrap:
    B: 0
    ci_alpha: 0.05
    enabled: false
  enabled: true
  forecast:
    clip_negative: true
    mass_conserve: true
    method: auto
  lambdas:
    log_max: 2
    log_min: -5
    n_points: 60
  mode: multifield
  model_selection:
    n_ell: 12
    p:
    - 2
    - 2
    - 2
    stride:
    - 2
    - 2
    - 2
  multifield_library:
    morse: true
    rho_strategy: continuity_first
    rich: true
  n_train: 340
  seed: 42
  subsample: 3
